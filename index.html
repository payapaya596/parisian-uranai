<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パリジャン度診断</title>

<meta property="og:image" content="https://payapaya596.github.io/parisian-uranai/images/parisien_image_00.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://payapaya596.github.io/parisian-uranai/images/parisien_image_00.jpg">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
}

.screen { display:none; }
.screen.active { display:block; }

button {
  padding:10px 20px;
  margin-top:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- intro -->
<div id="intro" class="screen active">
  <h1>パリジャン度診断</h1>
  <img id="intro-img" width="300">
  <br>
  <button onclick="start()">スタート</button>
</div>

<!-- quiz -->
<div id="quiz" class="screen">
  <h2 id="question"></h2>
  <img id="q-img" width="300">
  <br>
  <button onclick="answer(true)">YES</button>
  <button onclick="answer(false)">NO</button>
</div>

<!-- result -->
<div id="result" class="screen">
  <h2 id="percent"></h2>
  <h3 id="title"></h3>
  <button onclick="reset()">もう一度</button>
</div>

<script>
const questions = [
  "晴れたらテラス席に行く",
  "バゲットを途中でかじる",
  "カフェで長時間過ごす",
  "匂いにあまり敏感じゃない",
  "店に入ると挨拶する",
  "みんなと逆を言いたくなる",
  "路チューしたことがある",
  "毎日髪を洗わない",
  "パンを直置きできる",
  "友人にあまり期待しない"
];

const grades = [
  {min:10, pct:100, text:"完全なるパリジャン"},
  {min:8, pct:80, text:"かなりパリジャン"},
  {min:7, pct:70, text:"気質あり"},
  {min:5, pct:50, text:"半分パリジャン"},
  {min:3, pct:30, text:"観光客パリジャン"},
  {min:0, pct:10, text:"かなり日本人"}
];

const IMGS = {
  "00": "images/parisien_image_00.jpg",
  "01": "images/parisien_image_01.jpg",
  "02": "images/parisien_image_02.jpg",
  "03": "images/parisien_image_03.jpg",
  "04": "images/parisien_image_04.jpg",
  "05": "images/parisien_image_05.jpg",
  "06": "images/parisien_image_06.jpg",
  "07": "images/parisien_image_07.jpg",
  "08": "images/parisien_image_08.jpg",
  "09": "images/parisien_image_09.jpg",
  "10": "images/parisien_image_10.jpg"
};

let q = 0;
let score = 0;

document.getElementById("intro-img").src = IMGS["00"];

function start(){
  q=0; score=0;
  show("quiz");
  render();
}

function render(){
  document.getElementById("question").textContent = questions[q];
  document.getElementById("q-img").src = IMGS[String(q+1).padStart(2,'0')];
}

function answer(val){
  if(val) score++;
  q++;
  if(q < questions.length){
    render();
  } else {
    result();
  }
}

function result(){
  let g = grades.find(g=>score>=g.min);
  document.getElementById("percent").textContent = g.pct + "%";
  document.getElementById("title").textContent = g.text;
  show("result");
}

function reset(){
  show("intro");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
